<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Haushaltsbuch</title>
    <link rel="manifest" href="manifest.json">

        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="apple-mobile-web-app-title" content="Haushaltsbuch">
        <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1611/1611154.png">
        
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Wir fügen die Klasse 'layout-split' hinzu, um Flexbox zu aktivieren -->
    <div class="container layout-split">
        
        <!-- LINKE SPALTE: Dashboard & Eingabe -->
        <div class="left-column">
            <h1>💰 Haushaltsbuch</h1>
            
            <section id="dashboard">
                <div class="balance">
                    <h2>Kontostand: <span id="total-balance">0.00</span>€</h2>
                </div>
                <div class="stats">
                    <p>Einnahmen: <span id="total-income" style="color: green;">0.00</span>€</p>
                    <p>Ausgaben: <span id="total-expense" style="color: red;">0.00</span>€</p>
                </div>
            </section>

            <section id="input-section">
                <form id="transaction-form">
                    <input type="text" id="description" placeholder="Beschreibung (z.B. Gehalt, Miete)" required>
                    <input type="number" id="amount" placeholder="Betrag in €" step="0.01" required>
                    <select id="category">
                        <option value="einnahme">Einnahme (+)</option>
                        <option value="ausgabe">Ausgabe (-)</option>
                    </select>
                    <select id="subcategory">
                        <!-- Wird durch JS gefüllt -->
                    </select>
                    <button type="submit">Hinzufügen</button>
                </form>
            </section>
        </div>

        <!-- RECHTE SPALTE: Die sortierte Liste -->
        <div class="right-column">
            <section id="list-section">
                <div class="right-header">
                    <h3>Buchungsübersicht</h3>
                    <div class="export-controls">
                        <select id="export-format">
                            <option value="csv">Excel (CSV)</option>
                            <option value="pdf">PDF (Drucken)</option>
                        </select>
                        <button id="export-btn" class="export-btn">⬇ Export</button>
                    </div>
                </div>
                
                <!-- NEU: Ein Container (div) statt einer festen Liste (ul) -->
                <div id="transaction-list-container">
                    <!-- JS generiert hier gleich die Zwischenüberschriften und Listen -->
                </div>
            </section>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
